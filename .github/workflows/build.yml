name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore GeminiLiveTranslate.sln

      - name: Build
        run: dotnet build GeminiLiveTranslate.sln --configuration Release --no-restore

      - name: Publish framework-dependent
        run: >
          dotnet publish GeminiLiveTranslate/GeminiLiveTranslate.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output artifacts/win-x64

      - name: Publish self-contained single-file
        run: >
          dotnet publish GeminiLiveTranslate/GeminiLiveTranslate.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output artifacts/win-x64-self-contained

      - name: Upload framework-dependent artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeminiLiveTranslate-win-x64
          path: artifacts/win-x64/**

      - name: Upload self-contained artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeminiLiveTranslate-win-x64-self-contained
          path: artifacts/win-x64-self-contained/**
